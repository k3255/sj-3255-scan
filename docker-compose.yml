services:
  scanner:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    command: ["python", "-m", "app.main", "scan"]
  api:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["python", "-m", "app.main", "serve", "--host", "0.0.0.0", "--port", "8000"]
